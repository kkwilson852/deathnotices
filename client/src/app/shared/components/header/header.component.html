<nav class="navbar navbar-expand-md bg-body py-3 shadow-sm sticky-top">
  <div class="container">
    <!-- Brand -->
    <a class="navbar-brand primary-color fw-semibold" routerLink="/">
      LiberianDeaths.com
    </a>

    <!-- Mobile toggle -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav links -->
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-md-2">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/dearly-departed"
            routerLinkActive="active"
            title="Dearly Departed"
          >
            Dearly Departed
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/in-memory"
            routerLinkActive="active"
            title="In Memory"
          >
            In Memory
          </a>
        </li>

        <li class="nav-item dropdown" [class.show]="isManageOpen">
          <a
            class="nav-link dropdown-toggle"
            href="#"
            (click)="toggleManage($event)"
            [attr.aria-expanded]="isManageOpen"
          >
            Manage Notices
          </a>

          <ul class="dropdown-menu" [class.show]="isManageOpen">
            <li>
              <a class="dropdown-item" routerLink="/notice-entry">
                Submit Death Notice
              </a>
            </li>

            <li>
              <button class="dropdown-item" (click)="onEditNoticeClick()">
                Change Death Notice
              </button>
            </li>

            <li><hr class="dropdown-divider" /></li>

            <li>
              <a class="dropdown-item" routerLink="/enter-memoriam">
                Submit Memoriam
              </a>
            </li>

            <li>
              <button class="dropdown-item" (click)="onEditMemoriamClick()">
                Change Memoriam
              </button>
            </li>
          </ul>
        </li>
      </ul>

      <!-- CTA -->
      <!-- <button class="btn btn-primary">Button</button> -->

      <button
        type="button"
        class="nav-link btn btn-link"
        [class.active]="isContactUsActive()"
        (click)="onContactUsClick()"
      >
        Contact Us
      </button>
    </div>
  </div>
</nav>
