<section>
  <div class="text-center my-4">
    <h3 class="fw-light">In Memory</h3>
    <div class="divider mx-auto"></div>
  </div>

  <div class="row justify-content-center mb-2">
    <div class="col-12 d-flex justify-content-center mb-4">
      <app-memoriam-search></app-memoriam-search>
    </div>
  </div>
</section>

<div class="row d-flex justify-content-center">
  @if (isLoading) {
  <app-skeleton-circles [count]="6"></app-skeleton-circles>
  } @else { @for (memoriam of memoriams; track memoriam._id) {

  <div
    class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 d-flex flex-column align-items-center mb-4 memoriam-card"
    [routerLink]="['/memoriam-view', memoriam._id]"
  >
    <div class="card card-hover">
      <div
        class="card-img-top d-flex justify-content-center align-items-center p-2"
      >
        <img
          *ngIf="memoriam.imageId"
          class="img-fluid"
          [src]="apiUrl + '/image/' + memoriam.imageId"
          alt="Memoriam image"
          loading="lazy"
        />
      </div>
      <div class="card-body d-flex justify-content-center flex-column">
        <h4 class="card-title text-center" style="font-size: 14.7px">
          <strong>{{ memoriam.name | resizeAndEllipsis : 15 }}</strong>
        </h4>
        <h6
          class="text-muted card-subtitle mb-2 text-center"
          style="font-size: 15px"
        >
          {{ memoriam.createdAt | date : "MMMM d, yyyy" }}
        </h6>
      </div>
    </div>
  </div>
  } @if (memoriams.length === 0) {
  <div class="text-center mt-4">
    <p class="text-muted small">No memorial tributes found.</p>
  </div>
  } }
</div>

<div class="row d-flex justify-content-center">
  <!-- <app-pagination></app-pagination> -->
</div>
