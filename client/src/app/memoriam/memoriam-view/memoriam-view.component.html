<div class="container">
  <section class="my-3">
    <div class="row d-flex justify-content-center">
      <div class="text-center">
        <h3 class="fw-light">In Memory</h3>
        <div class="divider mx-auto"></div>
      </div>
    </div>
  </section>

  <section class="">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="row">
          <div
            class="col-12 d-flex flex-column justify-content-center align-items-center"
          >
            <img
              *ngIf="memoriam.imageId"
              class="img-fluid memoriam-image"
              [src]="apiUrl + '/image/' + memoriam.imageId"
              alt="memoriam image"
              loading="lazy"
            />

            <h4 class="mt-0">{{ memoriam.name }}</h4>
            <h6
              class="text-muted card-subtitle mb-2 text-center"
              style="font-size: 15px"
            >
              {{ memoriam.createdAt | date : "MMMM d, yyyy" }}
            </h6>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="mt-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="row d-flex">
          <div
            class="col-12 d-flex flex-column justify-content-center align-items-center"
          >
            <h5 class="">Announcement</h5>
            <textarea
              class="form-control-lg text-muted announcement-width"
              id="announcement"
              readonly
              appAutoResizeTextarea
              name="announcement"
              [value]="memoriam.announcement"
              style="border: 2px solid #ddd; overflow: hidden; font-size: 16px"
            ></textarea>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
