<div class="container my-2">
  <div class="row d-flex justify-content-center">
    <div class="row d-flex justify-content-center my-3">
      <div class="col-12 col-md-8 text-center">
        <h3 class="primary-color">Memoriam Edit Form</h3>
        <div class="divider mx-auto mb-2"></div>
        <small>
          Please edit the fields you wish to change. Fields marked with an
          asterisk (<span class="text-danger fw-bold">*</span>) are required.
        </small>
      </div>
    </div>
    <div class="col-12">
      <form
        #memoriamForm="ngForm"
        class="d-flex flex-column justify-content-center"
      >
        <section class="" *ngIf="memoriamEntryModel.editImageMode">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <app-image-upload [operation]="operation" />
            </div>
          </div>
        </section>

        <!-- Deceased Image + Name -->
        <section
          class=""
          *ngIf="
            !memoriamEntryModel.editImageMode && memoriamEntryModel.imageId
          "
        >
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="row">
                <div
                  class="col-12 d-flex flex-column justify-content-center align-items-center"
                >
                  <img
                    class="img-fluid memoriam-image"
                    [src]="apiUrl + '/image/' + memoriamEntryModel.imageId"
                    alt="Notice image"
                    loading="lazy"
                  />

                  <h4 class="mt-2">{{ memoriamEntryModel.name }}</h4>

                  <button
                    class="btn btn-primary btn-secondary px-4 py-2"
                    type="button"
                    (click)="toggleEditImageMode()"
                  >
                    <span>Edit Image</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Edit Image Button -->
        <!-- <section class="">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="row">
                <div class="row mt-3 d-flex justify-content-center">
                  <div class="col-12 col-md-4 d-flex justify-content-center">
                    <button
                      class="btn btn-primary btn-secondary px-4 py-2"
                      type="button"
                      (click)="toggleEditImageMode()"
                    >
                      <span>Edit Image</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section> -->

        <section class="mt-5">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="row d-flex justify-content-center">
                <div class="col-12 col-lg-8">
                  <div class="row d-none d-lg-flex">
                    <div class="col-6 col-lg-4">
                      <label class="col-form-label fw-bold"
                        >Edit Name: <span class="text-danger">*</span></label
                      >
                    </div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-12 col-lg-6 mb-3 mb-lg-0">
                      <label class="form-label d-lg-none me-2"
                        ><span class="w-100 col-form-label"
                          >Edit Name: <span class="text-danger">*</span></span
                        ></label
                      ><input
                        class="form-control"
                        type="text"
                        name="name"
                        [(ngModel)]="memoriamEntryModel.name"
                        required
                        #name="ngModel"
                        (change)="saveMemoriamData()"
                        style="border-width: 1.8px; width: 100%"
                        [ngClass]="{
                          'is-valid':
                            name.valid && (name.dirty || name.touched),
                          'is-invalid':
                            name.invalid && (name.dirty || name.touched)
                        }"
                      />
                      <div
                        *ngIf="name.invalid && (name.dirty || name.touched)"
                        class="alert"
                      >
                        <div *ngIf="name.hasError('required')" class="alert">
                          <small>Name is required.</small>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="mt-5">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="d-flex justify-content-center">
                <div class="col-12 col-md-8">
                  <label class="form-label fw-bold" style="font-size: 18px"
                    >Edit Memoriam: <span class="text-danger">*</span></label
                  ><textarea
                    class="form-control"
                    style="border-width: 1.8px"
                    rows="15"
                    name="announcement"
                    required
                    [(ngModel)]="memoriamEntryModel.announcement"
                    #announcement="ngModel"
                    (selectionchange)="saveMemoriamData()"
                    [ngClass]="{
                      'is-valid':
                        announcement.valid &&
                        (announcement.dirty || announcement.touched),
                      'is-invalid':
                        announcement.invalid &&
                        (announcement.dirty || announcement.touched)
                    }"
                  ></textarea>

                  <div
                    *ngIf="
                      announcement.invalid &&
                      (announcement.dirty || announcement.touched)
                    "
                    class="alert"
                  >
                    <div
                      *ngIf="announcement.hasError('required')"
                      class="alert"
                    >
                      <small>announcement is required.</small>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
        <!-- <section class="mt-5">
          <div class="row mt-2 d-flex justify-content-center">
            <div class="col-12 col-md-4">
              <button
                class="btn btn-primary px-4 py-2"
                type="button"
                (click)="submitMemoriam()"
                [disabled]="!memoriamForm.valid"
              >
                Submit Memoriam
              </button>
            </div>
          </div>
        </section> -->

        <div class="row mt-5 d-flex justify-content-center">
          <div class="col-12 col-md-4 d-flex justify-content-center">
            <button
              class="btn btn-primary px-4 py-2"
              type="button"
              (click)="submitMemoriam()"
              [disabled]="!memoriamForm.valid && !memoriamEntryModel.imageFile"
            >
              Submit Memoriam
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
